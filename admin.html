<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แดชบอร์ด — ระบบความพึงพอใจ</title>
<style>
  :root { --p:#4f46e5; --pd:#4338ca; --s:#10b981; --d:#ef4444; --w:#f59e0b;
          --bg:#f5f5f5; --card:#fff; --t:#111827; --m:#6b7280; --b:#e5e7eb; --r:14px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',Tahoma,sans-serif; background:var(--bg); min-height:100vh; }
  .topbar { background:var(--p); color:white; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
  .topbar h1 { font-size:18px; font-weight:700; }
  .topbar .right { display:flex; gap:10px; align-items:center; }
  .main { max-width:960px; margin:0 auto; padding:24px 16px; }
  .card { background:var(--card); border-radius:var(--r); padding:20px 22px; box-shadow:0 2px 8px rgba(0,0,0,.07); margin-bottom:16px; }
  .btn { padding:9px 18px; border:none; border-radius:9px; cursor:pointer; font-size:14px; font-weight:600; transition:.15s; }
  .btn-primary { background:var(--p); color:#fff; } .btn-primary:hover { background:var(--pd); }
  .btn-success { background:var(--s); color:#fff; } .btn-success:hover { background:#059669; }
  .btn-danger  { background:var(--d); color:#fff; } .btn-danger:hover  { background:#dc2626; }
  .btn-ghost   { background:#f3f4f6; color:var(--t); border:1px solid var(--b); } .btn-ghost:hover { background:#e5e7eb; }
  .btn-white   { background:#fff; color:var(--p); border:1.5px solid var(--p); } .btn-white:hover { background:#eef2ff; }
  .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
  .stat-card { background:var(--card); border-radius:var(--r); padding:18px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.07); }
  .stat-card .icon { font-size:28px; }
  .stat-card .val  { font-size:28px; font-weight:700; color:var(--t); margin:4px 0; }
  .stat-card .lbl  { font-size:13px; color:var(--m); }
  input, select, textarea { width:100%; padding:9px 12px; border:1.5px solid var(--b); border-radius:9px; font-size:14px; font-family:inherit; outline:none; transition:.2s; }
  input:focus, select:focus, textarea:focus { border-color:var(--p); }
  label { font-size:13px; font-weight:600; color:var(--t); display:block; margin-bottom:6px; }
  .mb12 { margin-bottom:12px; } .mb8 { margin-bottom:8px; } .mt12 { margin-top:12px; }
  .tag { display:inline-block; padding:2px 10px; border-radius:99px; font-size:12px; font-weight:600; }
  .tag-green { background:#d1fae5; color:#065f46; }
  .tag-gray  { background:#f3f4f6; color:#6b7280; }
  .modal-bg  { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius:16px; padding:28px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
  .modal h2 { font-size:18px; font-weight:700; margin-bottom:18px; }
  .qr-box { text-align:center; padding:16px; background:#f9fafb; border-radius:12px; }
  .qr-box img { border-radius:8px; }
  .bar-wrap { display:flex; gap:6px; align-items:flex-end; height:64px; margin-top:8px; }
  .bar-col   { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .bar-fill  { width:100%; border-radius:4px; min-height:4px; }
  .bar-lbl   { font-size:11px; color:var(--m); }
  .responses-list { margin-top:12px; }
  .resp-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #f3f4f6; font-size:13px; }
  .resp-row:last-child { border-bottom:none; }
  .spinner { width:36px; height:36px; border:3px solid var(--b); border-top-color:var(--p); border-radius:50%; animation:spin .8s linear infinite; margin:40px auto; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { text-align:center; padding:50px 20px; color:var(--m); }
  .empty .icon { font-size:40px; margin-bottom:10px; }
  .row-flex { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .survey-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
  .survey-title { font-size:17px; font-weight:700; }
  .survey-desc  { font-size:13px; color:var(--m); margin-top:3px; }
  .survey-meta  { font-size:13px; color:var(--t); margin-top:8px; }
  .survey-meta b { color:var(--p); }
  #login-screen { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f4ff; }
  .login-card { background:#fff; border-radius:18px; padding:36px 30px; max-width:360px; width:100%; box-shadow:0 4px 24px rgba(79,70,229,.12); text-align:center; }
  .login-card .icon { font-size:48px; margin-bottom:12px; }
  .login-card h1 { font-size:20px; font-weight:700; margin-bottom:4px; }
  .login-card p { color:var(--m); font-size:14px; margin-bottom:20px; }
  .hint-box { background:#fef9c3; border-radius:8px; padding:10px 14px; font-size:13px; color:#92400e; margin-top:14px; }
  @media(max-width:600px) { .stats-grid { grid-template-columns:1fr 1fr; } .stats-grid .stat-card:last-child { grid-column:1/-1; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="icon">🔐</div>
    <h1>เข้าสู่ระบบผู้ดูแล</h1>
    <p>ระบบสำรวจความพึงพอใจ</p>
    <div class="mb12">
      <label>รหัสผ่าน</label>
      <input type="password" id="login-pass" placeholder="กรอกรหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <p id="login-err" style="color:#ef4444;font-size:13px;min-height:18px;margin-bottom:6px"></p>
    <button class="btn btn-primary" style="width:100%;padding:11px" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="hint-box">💡 รหัสผ่านเริ่มต้น: <b>admin1234</b><br>แก้ไขได้ใน admin.html</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
  <div class="topbar">
    <h1>📊 แดชบอร์ดความพึงพอใจ</h1>
    <div class="right">
      <button class="btn btn-white" onclick="openCreateModal()">+ สร้างแบบสำรวจ</button>
      <button class="btn btn-ghost" onclick="logout()" style="background:rgba(255,255,255,.15);color:white;border:none">ออก</button>
    </div>
  </div>
  <div class="main">
    <div class="stats-grid" id="stats-grid"></div>
    <div id="survey-list"></div>
  </div>
</div>

<!-- MODAL: Create/Edit Survey -->
<div class="modal-bg" id="survey-modal">
  <div class="modal">
    <h2 id="modal-title">สร้างแบบสำรวจใหม่</h2>
    <div class="mb12">
      <label>ชื่อแบบสำรวจ *</label>
      <input id="m-title" placeholder="เช่น แบบสำรวจหน้าเคาน์เตอร์บริการ">
    </div>
    <div class="mb12">
      <label>คำอธิบาย</label>
      <textarea id="m-desc" rows="2" placeholder="คำอธิบายสั้นๆ (ไม่บังคับ)"></textarea>
    </div>
    <div class="mb12">
      <label>สถานะ</label>
      <select id="m-active">
        <option value="true">✅ เปิดรับคำตอบ</option>
        <option value="false">⏸ ปิดรับคำตอบ</option>
      </select>
    </div>
    <div class="mb12">
      <label>คำถามเพิ่มเติม <span style="font-weight:400;color:var(--m)">(ไม่บังคับ)</span></label>
      <p style="font-size:12px;color:var(--m);margin-bottom:8px">⭐ คะแนน 1–5 จะถามอัตโนมัติ สามารถเพิ่มคำถามปลายเปิดเพิ่มได้</p>
      <div id="questions-list"></div>
      <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="addQuestion()">+ เพิ่มคำถาม</button>
    </div>
    <div class="row-flex" style="justify-content:flex-end;gap:10px;margin-top:16px">
      <button id="m-delete" class="btn btn-danger" style="display:none" onclick="deleteSurveyModal()">🗑 ลบ</button>
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-success" onclick="saveSurvey()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- MODAL: QR Code -->
<div class="modal-bg" id="qr-modal">
  <div class="modal" style="max-width:400px">
    <h2 id="qr-title" style="margin-bottom:16px"></h2>
    <div class="qr-box">
      <img id="qr-img" src="" alt="QR Code" style="width:200px;height:200px">
      <p style="font-size:13px;color:var(--m);margin-top:10px">สแกน QR Code เพื่อทำแบบสำรวจ</p>
    </div>
    <div style="margin-top:14px">
      <label>ลิงก์โดยตรง</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="qr-link" readonly style="font-size:12px;background:#f9fafb">
        <button class="btn btn-primary" onclick="copyLink()" style="white-space:nowrap;padding:9px 14px">📋</button>
      </div>
    </div>
    <button class="btn btn-ghost" style="width:100%;margin-top:14px" onclick="closeQR()">ปิด</button>
    <a id="qr-download" download="qrcode.png" style="display:none"></a>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="downloadQR()">⬇ ดาวน์โหลด QR Code</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
var API_URL       = "https://script.google.com/macros/s/AKfycbxT5WQIVPfWlcsq2xqgfXt0MHXmEMrlU4tCdV1sJ9HRZJxLKW-gJIwBgPRvnE5DdBAR/exec";
var SURVEY_BASE   = "https://bonuskeex2.github.io/satisfaction"; // e.g. https://yourname.github.io/satisfaction
var ADMIN_PASS    = "admin1234"; // เปลี่ยนรหัสผ่านที่นี่

var SCORE_COLOR = ["","#ef4444","#f97316","#f59e0b","#10b981","#4f46e5"];
var SCORE_EMOJI = ["","😞","😕","😐","😊","😍"];
var SCORE_LABEL = ["","แย่มาก","แย่","พอใช้","ดี","ดีมาก"];

// ── Auth ─────────────────────────────────────────────────────
function doLogin() {
  var pass = document.getElementById("login-pass").value;
  if (pass === ADMIN_PASS) {
    sessionStorage.setItem("admin_ok","1");
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-app").style.display = "block";
    loadDashboard();
  } else {
    document.getElementById("login-err").textContent = "รหัสผ่านไม่ถูกต้อง";
  }
}
function logout() { sessionStorage.removeItem("admin_ok"); location.reload(); }
if (sessionStorage.getItem("admin_ok") === "1") {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("main-app").style.display = "block";
}

// ── API ───────────────────────────────────────────────────────
function apiGet(params) {
  var url = API_URL + "?t=" + Date.now();
  Object.entries(params).forEach(function(kv) {
    url += "&" + kv[0] + "=" + encodeURIComponent(typeof kv[1] === "object" ? JSON.stringify(kv[1]) : kv[1]);
  });
  return fetch(url).then(function(r) { return r.json(); });
}

// ── Dashboard ─────────────────────────────────────────────────
function loadDashboard() {
  if (!API_URL || API_URL.includes("PASTE_YOUR_APPS")) {
    document.getElementById("survey-list").innerHTML = "<div class='card' style='background:#fef9c3;color:#92400e'><b>⚠ ยังไม่ได้ตั้งค่า</b> — กรุณาแก้ไข API_URL และ SURVEY_BASE ใน admin.html</div>";
    return;
  }
  document.getElementById("survey-list").innerHTML = "<div class='spinner'></div>";
  apiGet({ action: "getDashboard" }).then(function(data) {
    renderStats(data.surveys, data.totalResponses, data.globalAvg);
    renderSurveys(data.surveys);
  }).catch(function() {
    document.getElementById("survey-list").innerHTML = "<div class='card' style='color:#ef4444'>เชื่อมต่อไม่ได้ — ตรวจสอบ API_URL</div>";
  });
}

function renderStats(surveys, total, avg) {
  document.getElementById("stats-grid").innerHTML = [
    { icon:"📋", val: surveys.length, lbl:"แบบสำรวจทั้งหมด",  bg:"#eef2ff" },
    { icon:"💬", val: total,          lbl:"คำตอบทั้งหมด",      bg:"#f0fdf4" },
    { icon:"⭐", val: avg ? parseFloat(avg).toFixed(1)+"/5" : "—", lbl:"คะแนนเฉลี่ยรวม", bg:"#fffbeb" }
  ].map(function(m) {
    return "<div class='stat-card' style='background:"+m.bg+"'><div class='icon'>"+m.icon+"</div><div class='val'>"+m.val+"</div><div class='lbl'>"+m.lbl+"</div></div>";
  }).join("");
}

function renderSurveys(surveys) {
  if (!surveys.length) {
    document.getElementById("survey-list").innerHTML = "<div class='card'><div class='empty'><div class='icon'>📋</div><p>ยังไม่มีแบบสำรวจ กด \"+ สร้างแบบสำรวจ\" เพื่อเริ่มต้น</p></div></div>";
    return;
  }
  document.getElementById("survey-list").innerHTML = surveys.map(function(s) {
    var maxDist = Math.max.apply(null, (s.dist||[0,0,0,0,0,0]).slice(1).concat([1]));
    var bars = [1,2,3,4,5].map(function(n) {
      var h = Math.max(4, ((s.dist[n]||0)/maxDist)*54);
      return "<div class='bar-col'><div class='bar-lbl'>"+(s.dist[n]||0)+"</div><div class='bar-fill' style='height:"+h+"px;background:"+SCORE_COLOR[n]+"'></div><div style='font-size:15px'>"+SCORE_EMOJI[n]+"</div></div>";
    }).join("");
    var recent = (s.recent||[]).slice(0,4).map(function(r) {
      return "<div class='resp-row'><span style='font-size:18px'>"+SCORE_EMOJI[r.score]+"</span><span style='color:"+SCORE_COLOR[r.score]+";font-weight:600'>"+SCORE_LABEL[r.score]+"</span>"+(r.comment?"<span style='color:#6b7280'>— "+r.comment+"</span>":"")+"<span style='margin-left:auto;color:#9ca3af;font-size:11px'>"+new Date(r.createdAt).toLocaleDateString("th")+"</span></div>";
    }).join("");
    return "<div class='card'>\
<div class='survey-header'>\
  <div>\
    <div class='survey-title'>"+s.title+" <span class='tag "+(s.active?"tag-green":"tag-gray")+"'>"+(s.active?"✅ เปิดรับ":"⏸ ปิด")+"</span></div>\
    "+(s.description?"<div class='survey-desc'>"+s.description+"</div>":"")+"\
    <div class='survey-meta'>📝 <b>"+s.count+"</b> คำตอบ &nbsp;⭐ เฉลี่ย <b>"+(s.avg||"—")+"/5</b></div>\
  </div>\
  <div class='row-flex'>\
    <button class='btn btn-ghost' onclick='openQR(\""+s.id+"\",\""+s.title.replace(/"/g,"&quot;")+"\")'>📱 QR Code</button>\
    <button class='btn btn-primary' onclick='openEditModal(\""+s.id+"\")'>✏️ แก้ไข</button>\
  </div>\
</div>\
"+(s.count>0?"<div class='bar-wrap'>"+bars+"</div>":"")+"\
"+(s.count>0?"<div class='responses-list'>"+recent+"</div>":"")+"\
</div>";
  }).join("");
}

// ── Modal Create/Edit ─────────────────────────────────────────
var editingId = null;
var qList     = [];

function openCreateModal() {
  editingId = null; qList = [];
  document.getElementById("modal-title").textContent = "สร้างแบบสำรวจใหม่";
  document.getElementById("m-title").value = "";
  document.getElementById("m-desc").value  = "";
  document.getElementById("m-active").value = "true";
  document.getElementById("m-delete").style.display = "none";
  renderQList();
  document.getElementById("survey-modal").classList.add("open");
}

function openEditModal(id) {
  apiGet({ action:"getSurvey", id:id }).then(function(s) {
    editingId = id; qList = s.questions || [];
    document.getElementById("modal-title").textContent = "แก้ไขแบบสำรวจ";
    document.getElementById("m-title").value  = s.title;
    document.getElementById("m-desc").value   = s.description || "";
    document.getElementById("m-active").value = s.active ? "true" : "false";
    document.getElementById("m-delete").style.display = "inline-block";
    renderQList();
    document.getElementById("survey-modal").classList.add("open");
  });
}

function renderQList() {
  document.getElementById("questions-list").innerHTML = qList.map(function(q,i) {
    return "<div style='display:flex;gap:8px;margin-bottom:8px'>\
<input value='"+q.text.replace(/"/g,"&quot;")+"' placeholder='คำถามที่ "+(i+1)+"' onchange='qList["+i+"].text=this.value'>\
<button class='btn btn-danger' style='padding:8px 10px;flex-shrink:0' onclick='removeQ("+i+")'>✕</button></div>";
  }).join("");
}

function addQuestion()  { qList.push({ id: Date.now().toString(), text: "" }); renderQList(); }
function removeQ(i)     { qList.splice(i,1); renderQList(); }
function closeModal()   { document.getElementById("survey-modal").classList.remove("open"); }

function saveSurvey() {
  var title = document.getElementById("m-title").value.trim();
  if (!title) { alert("กรุณากรอกชื่อแบบสำรวจ"); return; }
  var params = {
    action: editingId ? "updateSurvey" : "createSurvey",
    title: title,
    description: document.getElementById("m-desc").value.trim(),
    active: document.getElementById("m-active").value,
    questions: JSON.stringify(qList)
  };
  if (editingId) params.id = editingId;
  apiGet(params).then(function(res) {
    if (res.success || res.id) { closeModal(); loadDashboard(); }
    else alert("เกิดข้อผิดพลาด: " + (res.error||"unknown"));
  });
}

function deleteSurveyModal() {
  if (!confirm("ลบแบบสำรวจนี้? ข้อมูลคำตอบใน Sheets จะยังอยู่")) return;
  apiGet({ action:"deleteSurvey", id:editingId }).then(function() { closeModal(); loadDashboard(); });
}

// ── QR Modal ─────────────────────────────────────────────────
function openQR(id, title) {
  var link = SURVEY_BASE + "/index.html?id=" + id;
  document.getElementById("qr-title").textContent = "📱 " + title;
  document.getElementById("qr-link").value = link;
  var qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(link);
  document.getElementById("qr-img").src = qrUrl;
  document.getElementById("qr-modal").classList.add("open");
}
function closeQR() { document.getElementById("qr-modal").classList.remove("open"); }
function copyLink() {
  var val = document.getElementById("qr-link").value;
  if (navigator.clipboard) { navigator.clipboard.writeText(val).then(function() { alert("คัดลอกลิงก์แล้ว!"); }); }
  else { document.getElementById("qr-link").select(); document.execCommand("copy"); alert("คัดลอกลิงก์แล้ว!"); }
}
function downloadQR() {
  var src = document.getElementById("qr-img").src;
  var a   = document.getElementById("qr-download");
  a.href  = src + "&download=1";
  a.click();
}

// ── Close modals on bg click ──────────────────────────────────
["survey-modal","qr-modal"].forEach(function(id) {
  document.getElementById(id).addEventListener("click", function(e) {
    if (e.target === this) this.classList.remove("open");
  });
});

// Auto-load if already logged in
if (sessionStorage.getItem("admin_ok") === "1") loadDashboard();
</script>
</body>
</html>
