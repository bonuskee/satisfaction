<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>แบบสำรวจความพึงพอใจ</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --bg: #f0f4ff;
    --card: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); min-height: 100vh; padding: 16px; }
  .container { max-width: 480px; margin: 0 auto; }
  .card { background: var(--card); border-radius: var(--radius); padding: 20px 22px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(79,70,229,.08); }
  .header-card { background: var(--primary); color: white; text-align: center; padding: 28px 22px; }
  .header-card h1 { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .header-card p { opacity: .85; font-size: 14px; margin-top: 8px; }
  .stars { display: flex; justify-content: center; gap: 10px; margin: 6px 0 16px; }
  .star { font-size: 44px; cursor: pointer; transition: transform .12s; user-select: none; -webkit-tap-highlight-color: transparent; }
  .star:active { transform: scale(1.25); }
  .score-label { text-align: center; min-height: 36px; }
  .score-label .emoji { font-size: 32px; }
  .score-label .text { font-size: 17px; font-weight: 600; }
  label { font-size: 14px; color: var(--text); font-weight: 600; display: block; margin-bottom: 8px; }
  textarea, input[type=text] { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; resize: vertical; }
  textarea:focus, input[type=text]:focus { border-color: var(--primary); }
  .btn { width: 100%; padding: 14px; background: var(--success); color: white; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 600; cursor: pointer; transition: background .2s, transform .1s; }
  .btn:active { transform: scale(.98); }
  .btn:hover { background: #059669; }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .state-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
  .state-card { background: var(--card); border-radius: var(--radius); padding: 48px 32px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
  .state-card .icon { font-size: 64px; margin-bottom: 16px; }
  .state-card h2 { font-size: 22px; color: var(--text); margin-bottom: 10px; }
  .state-card p { color: var(--muted); font-size: 15px; line-height: 1.6; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 8px; padding-bottom: 20px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG — ใส่ URL ของ Google Apps Script ที่ Deploy แล้ว
// ══════════════════════════════════════════════════════════════
var API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

// ── Helpers ──────────────────────────────────────────────────
var SCORE_LABEL = ["","แย่มาก","แย่","พอใช้","ดี","ดีมาก"];
var SCORE_COLOR = ["","#ef4444","#f97316","#f59e0b","#10b981","#4f46e5"];
var SCORE_EMOJI = ["","😞","😕","😐","😊","😍"];

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(function(kv) {
    if (kv[0] === "class") e.className = kv[1];
    else if (kv[0].startsWith("on")) e[kv[0]] = kv[1];
    else e.setAttribute(kv[0], kv[1]);
  });
  if (typeof children === "string") e.innerHTML = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if(c) e.appendChild(c); });
  return e;
}

function api(params) {
  var url = API_URL + "?action=" + params.action + "&t=" + Date.now();
  Object.entries(params).forEach(function(kv) {
    if (kv[0] !== "action") url += "&" + kv[0] + "=" + encodeURIComponent(typeof kv[1] === "object" ? JSON.stringify(kv[1]) : kv[1]);
  });
  return fetch(url).then(function(r) { return r.json(); });
}

function mount(node) {
  var app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(node);
}

// ── Screens ───────────────────────────────────────────────────
function showLoading(msg) {
  mount(el("div", {class:"state-screen"}, [
    el("div", {class:"state-card"}, [
      el("div", {class:"spinner"}),
      el("p", {}, msg || "กำลังโหลด...")
    ])
  ]));
}

function showError(title, msg) {
  mount(el("div", {class:"state-screen"}, [
    el("div", {class:"state-card"}, [
      el("div", {class:"icon"}, "❌"),
      el("h2", {}, title),
      el("p", {}, msg)
    ])
  ]));
}

function showSuccess(score) {
  var wrap = el("div", {class:"state-screen"}, [
    el("div", {class:"state-card", style:"background:#f0fdf4"}, [
      el("div", {class:"icon"}, "🎉"),
      el("h2", {style:"color:#065f46"}, "ขอบคุณมากครับ/ค่ะ"),
      el("p", {}, "ข้อมูลของคุณถูกบันทึกเรียบร้อยแล้ว"),
      el("div", {style:"margin-top:20px;padding:16px;background:white;border-radius:12px;border:1px solid #d1fae5"}, [
        el("div", {style:"font-size:42px"}, SCORE_EMOJI[score]),
        el("div", {style:"font-size:18px;font-weight:700;color:"+SCORE_COLOR[score]+";margin-top:8px"}, SCORE_LABEL[score])
      ])
    ])
  ]);
  mount(wrap);
}

// ── Survey Form ───────────────────────────────────────────────
function showSurveyForm(survey) {
  var score  = 0;
  var hovered = 0;
  var answers = {};

  var starEls   = [];
  var labelEl   = el("div", {class:"score-label"});
  var questionSection = el("div");
  var submitBtn = el("button", {class:"btn", disabled:"true"}, "⭐ กรุณาให้คะแนนก่อน");

  function renderStars() {
    var display = hovered || score;
    starEls.forEach(function(s, i) {
      s.style.color = (i + 1) <= display ? "#f59e0b" : "#d1d5db";
    });
    if (display > 0) {
      labelEl.innerHTML = "<span class='emoji'>" + SCORE_EMOJI[display] + "</span>&nbsp; <span class='text' style='color:" + SCORE_COLOR[display] + "'>" + SCORE_LABEL[display] + "</span>";
    } else {
      labelEl.innerHTML = "";
    }
    if (score > 0) {
      submitBtn.removeAttribute("disabled");
      submitBtn.textContent = "✅ ส่งแบบสำรวจ";
    }
  }

  for (var i = 1; i <= 5; i++) {
    (function(n) {
      var s = el("span", {class:"star"}, "★");
      s.addEventListener("click",      function() { score = n; renderStars(); });
      s.addEventListener("mouseenter", function() { hovered = n; renderStars(); });
      s.addEventListener("mouseleave", function() { hovered = 0; renderStars(); });
      s.addEventListener("touchstart", function(ev) { ev.preventDefault(); score = n; renderStars(); }, {passive:false});
      starEls.push(s);
    })(i);
  }

  // Build questions
  var questions = survey.questions || [];
  questions.forEach(function(q) {
    var ta = el("textarea", {rows:"2", placeholder:"พิมพ์คำตอบที่นี่..."});
    ta.addEventListener("input", function() { answers[q.id] = ta.value; });
    questionSection.appendChild(el("div", {class:"card"}, [
      el("label", {}, q.text),
      ta
    ]));
  });
  var commentBox = el("textarea", {rows:"3", placeholder:"บอกเล่าประสบการณ์ของคุณ..."});
  commentBox.addEventListener("input", function() { answers["_comment"] = commentBox.value; });

  submitBtn.addEventListener("click", function() {
    if (!score) return;
    submitBtn.disabled = true;
    submitBtn.textContent = "⏳ กำลังส่ง...";
    api({
      action: "submitResponse",
      surveyId: survey.id,
      score: score,
      comment: answers["_comment"] || "",
      answers: JSON.stringify(answers)
    }).then(function(res) {
      if (res.success) { showSuccess(score); }
      else { alert("เกิดข้อผิดพลาด: " + (res.error || "unknown")); submitBtn.disabled = false; submitBtn.textContent = "✅ ส่งแบบสำรวจ"; }
    }).catch(function() { alert("เชื่อมต่อไม่ได้ กรุณาลองใหม่"); submitBtn.disabled = false; submitBtn.textContent = "✅ ส่งแบบสำรวจ"; });
  });

  var page = el("div", {class:"container"}, [
    el("div", {class:"card header-card"}, [
      el("div", {style:"font-size:36px;margin-bottom:8px"}, "📋"),
      el("h1", {}, survey.title),
      survey.description ? el("p", {}, survey.description) : null
    ]),
    el("div", {class:"card"}, [
      el("label", {style:"text-align:center;font-size:16px;display:block;margin-bottom:12px"}, "คุณพึงพอใจบริการของเรามากแค่ไหน?"),
      el("div", {class:"stars"}, starEls),
      labelEl
    ]),
    questionSection,
    el("div", {class:"card"}, [
      el("label", {}, "ความคิดเห็นเพิ่มเติม (ไม่บังคับ)"),
      commentBox
    ]),
    submitBtn,
    el("p", {class:"footer-note"}, "🔒 ข้อมูลของคุณจะถูกเก็บเป็นความลับ ไม่มีการเก็บข้อมูลส่วนตัว")
  ]);
  mount(page);
}

// ── Init ──────────────────────────────────────────────────────
function init() {
  var params  = new URLSearchParams(window.location.search);
  var surveyId = params.get("id") || params.get("survey");

  if (!surveyId) {
    showError("ไม่พบแบบสำรวจ", "กรุณาสแกน QR Code ใหม่อีกครั้ง หรือตรวจสอบลิงก์");
    return;
  }
  if (!API_URL || API_URL.includes("PASTE_YOUR")) {
    showError("ยังไม่ได้ตั้งค่า", "กรุณาแก้ไข API_URL ในไฟล์ index.html ให้ตรงกับ Google Apps Script URL ของคุณ");
    return;
  }

  showLoading("กำลังโหลดแบบสำรวจ...");
  api({ action: "getSurvey", id: surveyId })
    .then(function(survey) {
      if (survey.error) { showError("ไม่พบแบบสำรวจ", survey.error); return; }
      if (!survey.active) { showError("ปิดรับคำตอบแล้ว", "แบบสำรวจนี้ปิดรับคำตอบชั่วคราว"); return; }
      showSurveyForm(survey);
    })
    .catch(function() { showError("เชื่อมต่อไม่ได้", "กรุณาตรวจสอบอินเทอร์เน็ตและลองใหม่อีกครั้ง"); });
}

init();
</script>
</body>
</html>
