<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>แบบประเมินความพึงพอใจ</title>

<style>
body{
  font-family:Arial;
  max-width:600px;
  margin:auto;
  padding:20px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin:8px 0;
}

button{
  background:#4285f4;
  color:white;
  border:none;
  padding:12px 20px;
}
</style>

</head>
<body>

<h2>แบบประเมินความพึงพอใจ</h2>

<input id="name" placeholder="ชื่อ">

<input id="department" placeholder="แผนก">

<select id="rating">
  <option value="5">5 - ดีมาก</option>
  <option value="4">4 - ดี</option>
  <option value="3">3 - ปานกลาง</option>
  <option value="2">2 - ควรปรับปรุง</option>
  <option value="1">1 - ไม่พอใจ</option>
</select>

<textarea id="comment"
placeholder="ข้อเสนอแนะ"></textarea>

<button onclick="submitForm()">
ส่งแบบประเมิน
</button>

<script>

const API_URL =
"https://script.google.com/macros/s/xxxxxxxx/exec";

async function submitForm(){

  const data = {
    name: document.getElementById('name').value,
    department: document.getElementById('department').value,
    rating: document.getElementById('rating').value,
    comment: document.getElementById('comment').value
  };

  const res = await fetch(API_URL,{
    method:'POST',
    body:JSON.stringify(data)
  });

  const result = await res.json();

  if(result.success){
    alert('บันทึกสำเร็จ');
  }else{
    alert('เกิดข้อผิดพลาด');
  }
}

</script>

</body>
</html>
